name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    # Run on all pull requests (create and update)
    types: [opened, synchronize, reopened]

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build and test
        run: ./gradlew build

      - name: Generate coverage report
        run: ./gradlew koverXmlReport

      - name: Add coverage report to PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: mi-kas/kover-report@v1
        with:
          path: ${{ github.workspace }}/build/reports/kover/report.xml
          title: Code Coverage
          update-comment: true
          min-coverage-overall: 0
          min-coverage-changed-files: 0

      - name: Extract coverage percentage
        if: github.ref == 'refs/heads/main'
        id: coverage
        run: |
          MISSED=$(grep -oP 'type="INSTRUCTION" missed="\K[0-9]+' build/reports/kover/report.xml | head -1)
          COVERED=$(grep -oP 'type="INSTRUCTION" missed="[0-9]+" covered="\K[0-9]+' build/reports/kover/report.xml | head -1)
          TOTAL=$((MISSED + COVERED))
          PERCENT=$(awk "BEGIN {printf \"%.1f\", ($COVERED / $TOTAL) * 100}")
          echo "coverage=$PERCENT" >> $GITHUB_OUTPUT

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.coverage }}%
          valColorRange: ${{ steps.coverage.outputs.coverage }}
          minColorRange: 0
          maxColorRange: 100

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web-client

      - name: Typecheck
        run: npm run typecheck
        working-directory: web-client

      - name: Build
        run: npm run build
        working-directory: web-client

