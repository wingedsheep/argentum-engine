# Local development overrides — activated via spring.profiles.active=local
# Defaults to Ollama for AI. Start with: just ollama-up && just ollama-pull qwen3.5

game:
  sets:
    bloomburrow-enabled: true
    edge-of-eternities-enabled: true
  ai:
    mode: engine
    base-url: ${GAME_AI_BASE_URL:http://localhost:11434/v1}
    api-key: ${GAME_AI_API_KEY:ollama}
    model: ${GAME_AI_MODEL:qwen/qwen3.6-plus:free}
    timeout-ms: ${GAME_AI_TIMEOUT_MS:120000}
