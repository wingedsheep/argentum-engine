server:
  port: 8080

spring:
  application:
    name: argentum-game-server

cache:
  redis:
    enabled: ${CACHE_REDIS_ENABLED:false}
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    ttl-minutes: ${REDIS_TTL_MINUTES:1440}
    key-prefix: "argentum:"

game:
  dev-endpoints:
    # Enable development endpoints for manual testing. NEVER enable in production.
    enabled: ${GAME_DEV_ENDPOINTS_ENABLED:false}
  hand-smoother:
    # MTGA-style hand smoothing for opening hands. Selects the best of N candidate hands.
    enabled: ${GAME_HAND_SMOOTHER_ENABLED:true}
    candidates: ${GAME_HAND_SMOOTHER_CANDIDATES:3}
  sets:
    # Feature toggle for unreleased sets
    onslaught-enabled: ${GAME_SETS_ONSLAUGHT_ENABLED:true}
    dominaria-enabled: ${GAME_SETS_DOMINARIA_ENABLED:false}
  admin:
    # Password for admin replay feature. Feature is disabled if not set.
    password: ${GAME_ADMIN_PASSWORD:}
  ai:
    enabled: ${GAME_AI_ENABLED:false}
    model: ${GAME_AI_MODEL:qwen/qwen3.5-flash-02-23}
    deckbuilding-model: ${GAME_AI_DECKBUILDING_MODEL:qwen/qwen3.5-flash-02-23}
    open-router-api-key: ${OPENROUTER_API_KEY:}

# Swagger UI - only enabled when dev endpoints are enabled
springdoc:
  api-docs:
    enabled: ${GAME_DEV_ENDPOINTS_ENABLED:false}
  swagger-ui:
    enabled: ${GAME_DEV_ENDPOINTS_ENABLED:false}
    path: /swagger-ui.html

logging:
  level:
    com.wingedsheep.gameserver: DEBUG
    org.springframework.web.socket: DEBUG
