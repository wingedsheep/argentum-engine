server:
  port: 8080

spring:
  application:
    name: argentum-game-server

cache:
  redis:
    enabled: ${CACHE_REDIS_ENABLED:false}
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    ttl-minutes: ${REDIS_TTL_MINUTES:1440}
    key-prefix: "argentum:"

game:
  debug-mode: ${GAME_DEBUG_MODE:false}
  dev-endpoints:
    # Enable development endpoints for manual testing. NEVER enable in production.
    enabled: ${GAME_DEV_ENDPOINTS_ENABLED:false}
  hand-smoother:
    # MTGA-style hand smoothing for opening hands. Selects the best of N candidate hands.
    enabled: ${GAME_HAND_SMOOTHER_ENABLED:true}
    candidates: ${GAME_HAND_SMOOTHER_CANDIDATES:3}
  sets:
    # All sets are enabled by default. Codes listed in disabled-by-default are
    # off unless overridden in the enabled map. Set codes are uppercase (POR,
    # ONS, DOM, EOE, etc.); see MtgSetCatalog for the full list.
    # disabled-by-default and enabled default to empty (see GameProperties);
    # do not declare them as empty literals ([] / {}) — Spring Boot's binder
    # flattens an empty collection to an empty-string property that fails to
    # bind to the Map/Set target. Override them in a profile (see
    # application-local.yml) when you actually need entries.
  admin:
    # Password for admin replay feature. Feature is disabled if not set.
    password: ${GAME_ADMIN_PASSWORD:}
  ai:
    enabled: ${GAME_AI_ENABLED:true}
    # AI mode: "engine" (built-in, no API key needed) or "llm" (requires API key)
    mode: ${GAME_AI_MODE:engine}
    base-url: ${GAME_AI_BASE_URL:https://openrouter.ai/api/v1}
    api-key: ${GAME_AI_API_KEY:${OPENROUTER_API_KEY:}}
    model: ${GAME_AI_MODEL:qwen/qwen3.6-plus:free}
    deckbuilding-model: ${GAME_AI_DECKBUILDING_MODEL:}
    open-router-api-key: ${OPENROUTER_API_KEY:}
    # When true, AI sealed decks always use the deterministic heuristic builder (skips the LLM).
    heuristic-deckbuilding: ${GAME_AI_HEURISTIC_DECKBUILDING:false}

# Swagger UI - only enabled when dev endpoints are enabled
springdoc:
  api-docs:
    enabled: ${GAME_DEV_ENDPOINTS_ENABLED:false}
  swagger-ui:
    enabled: ${GAME_DEV_ENDPOINTS_ENABLED:false}
    path: /swagger-ui.html

logging:
  level:
    com.wingedsheep.gameserver: DEBUG
    org.springframework.web.socket: DEBUG
