server:
  # Distinct port from game-server (8080) so both can run side-by-side
  # during development.
  port: 8081

spring:
  application:
    name: argentum-gym-server

# Swagger UI is enabled by default here because the gym server is a
# development/training tool. Disable in any deployment where the
# endpoint surface should be hidden (set both to `false`).
springdoc:
  api-docs:
    enabled: ${GYM_OPENAPI_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${GYM_OPENAPI_ENABLED:true}
    path: /swagger-ui.html

logging:
  level:
    com.wingedsheep.gym.server: DEBUG
